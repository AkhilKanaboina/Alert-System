spring:
  application:
    name: alert-system

  # ── Database (H2 for dev) ──────────────────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:h2:mem:alertdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USER:sa}
    password: ${DB_PASS:}

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # ── Cache ─────────────────────────────────────────────────────────────────
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=300s

  # ── Scheduling ────────────────────────────────────────────────────────────
  task:
    scheduling:
      pool:
        size: 5

# ── App-level JWT Config ───────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:fleet-guard-super-secret-key-that-is-at-least-256-bits-long-for-hs256}
    expiration-ms: ${JWT_EXPIRATION:3600000}

# ── Actuator ──────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# ── Server ────────────────────────────────────────────────────────────────
server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

# ── Springdoc OpenAPI ─────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.fleetguard: DEBUG
    org.springframework.security: INFO
